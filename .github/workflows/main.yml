name: Merge upstream branches
on:
  push:
  schedule:
    - cron:  '0 18 * * *'
  watch:
    types: [started]
jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.3.5
        with:
          fetch-depth: 0 

      - name: Merge upstream
        run: |
          git config --global user.name 'ckcat'
          git config --global user.email 'ckcatck@qq.com'
          
          git remote add upstream https://github.com/KasperskyLab/hrtng.git
          git fetch upstream
          git checkout master
          # 1. 尝试合并，但不要自动 Commit
          git merge --no-commit --no-ff upstream/master
          # 2. 重置 .github 文件夹
          git checkout HEAD -- .github/
          # 3. 提交合并结果
          git commit -m "Merge upstream (excluding .github changes)" || echo "Nothing to commit"
          # 4. 推送 master 分支
          git push origin master
